name: Build Windows exe

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --onedir --add-data "Sons;Sons" --add-data "Animacoes;Animacoes" --add-data "Sistemas;Sistemas" main.py

      - name: Zip dist folder
        run: |
          Compress-Archive -Path dist\main\* -DestinationPath dist\JogoTrem-dist.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JogoTrem-dist
          path: |
            dist/main
            dist/JogoTrem-dist.zip
